<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zero Negative Calculator by Rahul Bhatt</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#4c1d95,#1e093a);
  color:#fff;
}

.header{text-align:center;padding:20px;}
.logoBox{display:inline-block;background:#fff;padding:10px 14px;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,0.4);}
.logo{width:90px;}
.title{font-size:22px;font-weight:bold;margin-top:10px;}

.container{max-width:420px;margin:10px auto;padding:10px;}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:15px;
  margin-bottom:14px;
  border:1px solid rgba(255,255,255,0.2);
}

.banner{
  background:rgba(255,0,0,0.1);
  border:1px solid rgba(255,0,0,0.3);
  color:#ffb4b4;
  padding:12px;
  border-radius:12px;
  font-size:13px;
}

label{font-size:14px;}
input{
  width:100%;
  padding:12px;
  margin:6px 0 10px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:13px;
  background:linear-gradient(90deg,#7c3aed,#5f259f);
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:16px;
}

.outputCard{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:18px;
  border-radius:18px;
}

.section{margin-bottom:14px;}
.secTitle{font-weight:bold;}

.safe{color:#4ade80;}
.warn{color:#facc15;}
.danger{color:#f87171;}

.bar{height:14px;background:rgba(255,255,255,0.2);border-radius:20px;}
.fill{height:100%;border-radius:20px;text-align:right;font-size:10px;color:#fff;padding-right:6px;}

.purple{background:linear-gradient(90deg,#a78bfa,#7c3aed);}
.orange{background:linear-gradient(90deg,#fbbf24,#f97316);}
.green{background:linear-gradient(90deg,#4ade80,#22c55e);}
</style>
</head>

<body>

<div class="header">
<div class="logoBox">
<img class="logo" src="https://download.logo.wine/logo/PhonePe/PhonePe-Logo.wine.png">
</div>
<div class="title">Smart TP Calculation By Rahul Bhatt</div>
</div>

<div class="container">

<div class="banner">
📌 ACE app → Salary Details me jaakar  
11th se 10th tak ka Gross & Valid TP count karo  
❌ Sunday / Holiday include mat karo
</div>

<div class="card">

<label>📊 11th Last Month – 10th This Month (Gross TP)</label>
<input type="number" id="gross">

<label>✅ 11th Last Month – 10th This Month (Valid TP)</label>
<input type="number" id="valid">

<label>📅 1st – 21st TP</label>
<input type="number" id="tp21">

<button onclick="calc()">Calculate</button>

</div>

<div id="output" class="outputCard"></div>

<div class="card">
<div>🎯 220 TP<div class="bar"><div id="p1" class="fill purple"></div></div></div>
<div>📅 150 TP<div class="bar"><div id="p2" class="fill orange"></div></div></div>
<div>📊 GVR<div class="bar"><div id="p3" class="fill green"></div></div></div>
</div>

</div>

<script>

function calc(){

let g = Number(gross.value);
let v = Number(valid.value);
let t = Number(tp21.value);

let gvr = g>0 ? (v/g)*100 : 0;
gvr = Number(gvr.toFixed(2));

// progress
p1.style.width = Math.min((v/220)*100,100)+"%";
p2.style.width = Math.min((t/150)*100,100)+"%";
p3.style.width = Math.min((gvr/90)*100,100)+"%";

// GAP CALC
let gap220 = Math.max(0, 220 - v);
let gap150 = Math.max(0, 150 - t);

// Condition 1
let c1 = v >= 220 
  ? "✅ 220 TP Complete"
  : `❌ 220 TP Complete nahi<br>👉 ${gap220} TP aur chahiye`;

// Condition 2
let c2 = "";
if(t >= 150){
  if(gvr >= 85){
    c2 = "✅ 150 TP Complete<br>✅ GVR ≥ 85%";
  }
  else if(gvr >= 80){
    c2 = "⚠️ GVR 80–84%";
  }
  else{
    c2 = "❌ GVR < 80%";
  }
} else {
  c2 = `❌ 150 TP Complete nahi<br>👉 ${gap150} TP aur chahiye`;
}

// result
let result="",className="";
if(gvr>=90){result="🟢 No Deduction (High GVR)";className="safe";}
else if(v>=220){result="🟢 No Deduction";className="safe";}
else if(t>=150){
  if(gvr>=85){result="🟢 No Deduction";className="safe";}
  else if(gvr>=80){result="🟡 Half Deduction";className="warn";}
  else{result="🔴 Full Deduction";className="danger";}
}
else{result="🔴 Full Deduction";className="danger";}

// output
output.innerHTML = `
<div class="section"><b>📊 GVR:</b> ${gvr}%</div>

<div class="section">
<div class="secTitle">🎯 Condition 1</div>
${c1}
</div>

<div class="section">
<div class="secTitle">📅 Condition 2</div>
${c2}
</div>

<div class="section">
<div class="secTitle">💰 Final Result</div>
<span class="${className}">${result}</span>
</div>
`;

}

</script>

</body>
</html>
